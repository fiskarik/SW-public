- type: constructionGraph
  id: Mannequin
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: mannequin
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 8 # Imperial Medieval
            #- material: MetalRod imperial disable start
            #  amount: 2
            #  doAfter: 2 imperial disable end
    - node: mannequin
      entity: Mannequin
      edges:
        - to: start
          completed:
            - !type:EmptyAllContainers
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank
              amount: 5
            #- !type:SpawnPrototype imperial disable start
            #  prototype: PartRodMetal
            #  amount: 2  imperial disable end
          steps:
            - tool: Screwing
              doAfter: 3
