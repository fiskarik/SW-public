#ERT Junitor START
# Spawn ERT Junitor Preset
- type: entity
  #noSpawn: true
  id: SpawnERTWeakenedJunitorEVAPreset
  name: ghost role ERTWeakenedJunitor spawn point
  parent: MarkerBase
  components:
    - type: GhostRole
      name: ertcall-junitor-eva-name
      description: ertcall-junitor-eva-desc
      rules: ertcall-junitor-eva-rules
      raffle:
        settings: short
    - type: GhostRoleMobSpawner
      prototype: ERTWeakenedJunitorEVAPreset
    - type: Sprite
      sprite: Markers/jobs.rsi
      layers:
        - state: green
        - sprite: Markers/jobs.rsi
          state: ertjanitoreva


# ERT Junitor Preset
- type: entity
  parent: MobHuman
  id: ERTWeakenedJunitorEVAPreset
  name: ERT junitor
  suffix: EVA
  components:
    - type: RandomMetadata
      nameSegments:
      - NamesLast
    - type: Sprite
      netsync: false
      sprite: Markers/jobs.rsi
      state: ertjanitoreva
    - type: Loadout
      prototypes: [ ERTCallWeakenedJanitorGearEVA ]
    - type: RandomHumanoidAppearance
      randomizeName: false
    - type: AutoImplant
      implants:
      - MindShieldImplant


# ERT Junitor Weakened starting gear
- type: startingGear
  id: ERTCallWeakenedJanitorGearEVA
  equipment:
    jumpsuit: ClothingUniformJumpsuitERTJanitor
    back: ClothingBackpackCallERTJanitorFilled
    shoes: ClothingShoesGaloshes
    mask: ClothingMaskGasERT
    gloves: ClothingHandsGlovesColorBlack
    outerClothing: ClothingOuterWeakenedHardsuitERTJanitor # changed
    suitstorage: OxygenTankFilled
    id: ERTJanitorPDA
    ears: ClothingHeadsetAltCentCom
    belt: ClothingBeltJanitorFilled
    pocket1: ERTUplinkJunitorWithoutWeapons # changed


# ERT Junitor Uplink without weapons
- type: entity
  parent: [BaseERTUplink]
  id: ERTUplinkJunitorWithoutWeapons
  suffix: ERT
  components:
  - type: Store
    categories:
    - ERTUplinkUtilities
    - ERTUplinkJunitor
    - ERTUplinkPointless
    currencyWhitelist:
    - BlueSpaceCube
    balance:
      BlueSpaceCube: 20


# ERT Junitor weakened Hardsuit
- type: entity
  parent: ClothingOuterHardsuitCBURN
  id: ClothingOuterWeakenedHardsuitERTJanitor
  name: ERT janitor's hardsuit
  description: A protective hardsuit worn by the janitors of an emergency response team.
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Hardsuits/ERTSuits/ertjanitor.rsi
  - type: Clothing
    sprite: Clothing/OuterClothing/Hardsuits/ERTSuits/ertjanitor.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitERTJanitor
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.8
        Cold: 0.8
        Shock: 0.8
        Radiation: 0.8
        Caustic: 0.8
        Stamina: 0.8
#ERT Junitor END





