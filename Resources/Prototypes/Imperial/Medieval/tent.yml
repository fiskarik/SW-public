- type: entity
  parent: BarricadeMedieval
  id: WallTentCloth
  name: Cloth tent
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Decor/cloth_tent.rsi
    state: p0
  - type: CableVisualizer
    statePrefix: p
  - type: Physics
    bodyType: Static
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialCloth1
      amount: 1
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Inflatable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Occluder
  - type: Appearance
  - type: CableVis
    node: power
  - type: NodeContainer
    nodes:
      power:
        !type:CableNode
        nodeGroupID: MVPower
  - type: Transform
    anchored: true
    noRot: true
  - type: ExplosionResistance
    damageCoefficient: 2
  - type: Tag
    tags:
      - Wall
  - type: Construction
    graph: WallTentCloth
    node: WallTentCloth

- type: construction
  id: WallTentCloth
  name: стена палатки
  description: Дешевое укрытие
  graph: WallTentCloth
  startNode: start
  targetNode: WallTentCloth
  category: construction-category-furniture
  icon:
    sprite: Imperial/Medieval/Decor/cloth_tent.rsi
    state: p0
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  conditions:
    - !type:TileNotBlocked

- type: constructionGraph
  id: WallTentCloth
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: WallTentCloth
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Cloth
              amount: 5
              doAfter: 8
    - node: WallTentCloth
      entity: WallTentCloth
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank
              amount: 1
          steps:
            - tool: Prying
              doAfter: 500

#DOOR
- type: entity
  parent: MedievalAirlock
  id: DoorTentCloth
  name: Cloth tent door
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Decor/cloth_tent.rsi
    state: closed
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 15
        layer:
        - WallLayer
  - type: Physics
    bodyType: Static
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialCloth1
      amount: 1
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Inflatable
  - type: Door
    occludes: false
    openSound:
      path: /Audio/Misc/zip.ogg
    closeSound:
      path: /Audio/Misc/zip.ogg
  #- type: Occluder
  #  enabled: false
  - type: InteractionOutline
  - type: Construction
    graph: DoorTentCloth
    node: DoorTentCloth

- type: construction
  id: DoorTentCloth
  name: дверь палатки
  description: Простая тканевая шторка для палатки
  graph: DoorTentCloth
  startNode: start
  targetNode: DoorTentCloth
  category: construction-category-furniture
  icon:
    sprite: Imperial/Medieval/Decor/cloth_tent.rsi
    state: closed
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  conditions:
    - !type:TileNotBlocked

- type: constructionGraph
  id: DoorTentCloth
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: DoorTentCloth
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Cloth
              amount: 8
              doAfter: 12
    - node: DoorTentCloth
      entity: DoorTentCloth
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank
              amount: 1
          steps:
            - tool: Prying
              doAfter: 599








